name: Publish npm packages

on:
  push:
    tags:
      - 'pi-elasticsearch-http@v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name to publish'
        required: true
        default: '@zegging/pi-elasticsearch-http'
        type: string
      ref:
        description: 'Git ref to publish (tag/branch/sha). Defaults to current ref.'
        required: false
        type: string

permissions: {}

concurrency:
  group: publish-npm-${{ github.event.inputs.package || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PACKAGE_NAME: ${{ github.event.inputs.package || '@zegging/pi-elasticsearch-http' }}
      SOURCE_REF: ${{ github.event.inputs.ref || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.SOURCE_REF }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Test
        run: npm test

      - name: Check
        run: npm run check

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@latest --ignore-scripts
          npm --version

      - name: Publish package
        run: node scripts/publish.mjs "${PACKAGE_NAME}"
